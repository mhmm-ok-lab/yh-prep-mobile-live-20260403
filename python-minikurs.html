<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python-minikurs — Nackademin</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ── Tokens ── */
:root{
  --bg:#ffffff;--bg2:#fafafa;--bg3:#f5f5f5;
  --text:#1a1a1a;--text2:#6b7280;
  --border:#e5e5e5;
  --acc:#185FA5;--acc-l:#EFF6FF;
  --ok-bg:#EAF3DE;--ok-bd:#639922;--ok-tx:#27500A;
  --er-bg:#FCEBEB;--er-bd:#A32D2D;--er-tx:#501313;
  --warn-bg:#FAEEDA;--warn-bd:#BA7517;--warn-tx:#633806;
  --code-bg:#f5f5f5;
  --kw:#185FA5;--str-c:#3B6D11;--num-c:#854F0B;--cmt-c:#9ca3af;
  --nav-w:220px;--switch-h:38px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#222222;--bg3:#2a2a2a;
    --text:#e5e5e5;--text2:#9ca3af;
    --border:#333333;
    --acc:#60a5fa;--acc-l:#1e3a5f;
    --ok-bg:#1a2e1a;--ok-bd:#4ade80;--ok-tx:#86efac;
    --er-bg:#2e1a1a;--er-bd:#f87171;--er-tx:#fca5a5;
    --warn-bg:#2e2010;--warn-bd:#fbbf24;--warn-tx:#fcd34d;
    --code-bg:#2a2a2a;
    --kw:#60a5fa;--str-c:#86efac;--num-c:#fcd34d;--cmt-c:#6b7280;
  }
}

/* ── Base ── */
body{font-family:"Space Grotesk",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;font-size:15px;padding-top:var(--switch-h)}
#app{display:flex;min-height:calc(100vh - var(--switch-h))}

/* ── Compact switch bar ── */
#switchbar{
  position:fixed;top:0;left:0;right:0;height:var(--switch-h);
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;padding:0 10px;z-index:60
}
.sw-menu{
  position:relative;
  z-index:70;
}
.sw-menu>summary{
  list-style:none;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;
  height:28px;padding:0 10px;border-radius:999px;border:1px solid var(--acc);
  background:var(--acc-l);color:var(--acc);font-size:12px;font-weight:700
}
.sw-menu>summary::-webkit-details-marker{display:none}
.sw-menu>summary::after{content:"▼";margin-left:6px;font-size:10px}
.sw-menu[open]>summary::after{content:"▲"}
.sw-menu-body{
  position:absolute;left:0;top:calc(100% + 6px);
  min-width:200px;padding:8px;
  background:var(--bg);border:1px solid var(--border);border-radius:10px;
  box-shadow:0 10px 22px rgb(15 23 42 / .14);
  display:grid;gap:6px;z-index:120
}
.sw-link{
  display:inline-flex;align-items:center;justify-content:flex-start;white-space:nowrap;
  min-height:30px;padding:0 10px;border-radius:999px;border:1px solid var(--border);
  background:var(--bg);color:var(--text2);font-size:12px;font-weight:600;text-decoration:none
}
.sw-link:hover{background:var(--bg3);color:var(--text)}
.sw-link.current{background:var(--acc-l);color:var(--acc);border-color:var(--acc);font-weight:700}
.sw-user{
  margin-left:auto;
  width:30px;height:30px;border-radius:999px;
  border:1px solid var(--acc);background:var(--acc-l);color:var(--acc);
  font-size:11px;font-weight:700;line-height:1;position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0
}
.sw-user-icon{font-size:14px;line-height:1}
.sw-user-initial{
  position:absolute;right:-2px;bottom:-2px;
  min-width:13px;height:13px;border-radius:999px;
  border:1px solid var(--border);background:var(--bg);color:var(--text);
  font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;padding:0 2px
}
.sw-user:hover{filter:brightness(0.97)}

/* ── Sidebar ── */
#sidebar{
  width:var(--nav-w);background:var(--bg2);border-right:1px solid var(--border);
  position:sticky;top:var(--switch-h);height:calc(100vh - var(--switch-h));overflow-y:auto;flex-shrink:0
}
.nav-top{
  padding:18px 16px 12px;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text2);
  border-bottom:1px solid var(--border);margin-bottom:4px
}
.nav-group{
  padding:10px 16px 3px;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text2)
}
.nav-sep{height:1px;background:var(--border);margin:6px 0}
.nav-item{
  display:flex;align-items:center;gap:8px;padding:9px 16px;
  cursor:pointer;font-size:13px;color:var(--text2);
  border-left:3px solid transparent;
  transition:background .12s,color .12s;user-select:none
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{
  border-left-color:var(--acc);color:var(--acc);
  background:var(--acc-l);font-weight:600
}
.nav-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--border);flex-shrink:0;transition:background .2s
}
.nav-item.done .nav-dot{background:var(--ok-bd)}
.nav-item.active .nav-dot{background:var(--acc)}

/* ── Main content ── */
#main{flex:1;padding:2.5rem 2.25rem;min-width:0}
#main-inner{max-width:680px}

/* ── Section header ── */
.sec-badge{
  display:inline-block;padding:2px 8px;
  background:var(--bg3);border:1px solid var(--border);border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px
}
.sec-title{font-size:22px;font-weight:500;margin-bottom:1.5rem;line-height:1.3;color:var(--text)}

/* ── Lesson body ── */
.lesson-body{line-height:1.8;margin-bottom:2.5rem;color:var(--text)}
.lesson-body p{margin-bottom:.75rem;color:var(--text)}
.lesson-body h3{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text2);margin:1.5rem 0 .6rem
}
.lesson-body ul{padding-left:1.2rem;margin-bottom:.75rem}
.lesson-body li{margin-bottom:.25rem}

/* ── Typography ── */
pre,code{font-family:ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace}
code{
  background:var(--code-bg);padding:1px 5px;border-radius:4px;
  font-size:12.5px;color:var(--text)
}
pre{
  background:var(--code-bg);padding:1rem 1.1rem;border-radius:8px;
  overflow-x:auto;font-size:13px;line-height:1.8;
  margin:.75rem 0 1rem;border:1px solid var(--border);color:var(--text)
}
pre code{background:none;padding:0;font-size:inherit;color:inherit}

/* ── Syntax highlight spans ── */
.kw{color:var(--kw);font-weight:600}
.str{color:var(--str-c)}
.num{color:var(--num-c)}
.cmt{color:var(--cmt-c);font-style:italic}

/* ── Info boxes ── */
.ibox{
  background:var(--acc-l);border:1px solid var(--acc);
  border-left:3px solid var(--acc);border-radius:8px;
  padding:.75rem 1rem;margin:.75rem 0;font-size:13.5px;color:var(--text)
}
.okbox{
  background:var(--ok-bg);border:1px solid var(--ok-bd);
  border-left:3px solid var(--ok-bd);border-radius:8px;
  padding:.75rem 1rem;margin:.75rem 0;font-size:13.5px;color:var(--ok-tx)
}
.errbox{
  background:var(--er-bg);border:1px solid var(--er-bd);
  border-left:3px solid var(--er-bd);border-radius:8px;
  padding:.75rem 1rem;margin:.75rem 0;font-size:13.5px;color:var(--er-tx)
}

/* ── Range lab ── */
.lab{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:1rem 1.25rem;margin:1rem 0
}
.lab-h{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text2);margin-bottom:1rem
}
.lab-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13.5px}
.lab-row label{font-family:monospace;font-weight:700;min-width:52px;color:var(--acc)}
.lab-row input[type=range]{flex:1;accent-color:var(--acc)}
.lab-row .lv{font-family:monospace;font-weight:700;min-width:26px;text-align:right;color:var(--acc)}
.lab-out{
  background:var(--code-bg);border:1px solid var(--border);
  border-radius:8px;padding:.75rem 1rem;
  font-family:monospace;font-size:13px;margin-top:.5rem;min-height:52px
}
.lab-expr{color:var(--acc);margin-bottom:5px;font-weight:700}
.lab-res{color:var(--ok-tx)}

/* ── Quiz section ── */
.quiz-wrap{
  border-top:1px solid var(--border);
  padding-top:2rem;margin-top:.5rem
}
.quiz-h{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text2);margin-bottom:1rem
}

/* ── Progress dots ── */
.dots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.dot-wrap{position:relative;display:inline-flex}
.dot{
  width:24px;height:24px;border-radius:50%;
  border:1px solid var(--border);background:var(--bg3);
  cursor:default;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
  transition:transform .15s ease-out,border-color .15s;
  color:var(--text2);flex-shrink:0
}
.dot.cur{
  background:var(--warn-bg);border-color:var(--warn-bd);
  color:var(--warn-tx)
}
.dot.ok{
  background:var(--ok-bg);border-color:var(--ok-bd);
  color:var(--ok-tx);cursor:pointer
}
.dot.fail{
  background:var(--er-bg);border-color:var(--er-bd);
  color:var(--er-tx);cursor:pointer
}
.dot.ok:hover,.dot.fail:hover{transform:scale(1.15)}
.dot.extra{border-style:dashed}
/* Tooltip */
.dot-tip{
  display:none;position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:4px 8px;
  font-size:11px;white-space:nowrap;color:var(--text);
  pointer-events:none;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.08)
}
.dot-wrap:hover .dot-tip{display:block}

/* ── Question card ── */
.qcard{
  border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.25rem;margin-bottom:.75rem;background:var(--bg)
}
.qcard.review-mode{opacity:.8}
.python-badge{
  display:inline-block;padding:2px 8px;
  background:#E6F1FB;border-radius:20px;
  font-size:11px;font-weight:600;color:#0C447C;
  letter-spacing:.04em;text-transform:uppercase;margin-bottom:.6rem
}
.extra-badge{
  display:inline-block;padding:2px 8px;
  background:var(--warn-bg);border-radius:20px;
  font-size:11px;font-weight:600;color:var(--warn-tx);
  letter-spacing:.04em;text-transform:uppercase;margin-bottom:.6rem
}
@media(prefers-color-scheme:dark){
  .python-badge{background:#0c2340;color:#7db8f7}
}
.qtxt{font-size:15px;font-weight:400;line-height:1.65;margin-bottom:.5rem;color:var(--text)}
.qcode{margin:.5rem 0}

/* ── Options ── */
.opts{display:grid;gap:6px;margin-top:.75rem}
.opt{
  display:block;width:100%;text-align:left;
  padding:10px 14px;background:var(--bg);
  border:1px solid var(--border);border-radius:8px;
  cursor:pointer;font-size:13.5px;font-family:inherit;
  color:var(--text);transition:background .12s,border-color .12s;line-height:1.45
}
.opt:hover:not(:disabled){background:var(--bg3)}
.opt.sel-ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx);font-weight:600}
.opt.sel-fail{background:var(--er-bg);border-color:var(--er-bd);color:var(--er-tx);font-weight:600}
.opt.show-ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-tx)}
.opt:disabled{cursor:default}

/* ── Feedback ── */
.fb{margin-top:.75rem;padding:.75rem 1rem;border-radius:8px;font-size:13.5px;line-height:1.7}
.fb.ok{background:var(--ok-bg);border-left:3px solid var(--ok-bd);color:var(--ok-tx)}
.fb.fail{background:var(--er-bg);border-left:3px solid var(--er-bd);color:var(--er-tx)}
.fb-title{font-weight:700;font-size:14px;margin-bottom:4px}

/* ── Buttons ── */
.btn-next{
  margin-top:.75rem;padding:8px 18px;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  cursor:pointer;font-size:13px;font-family:inherit;
  transition:background .12s;
}
.btn-next:hover{background:var(--bg3)}
.btn-go{
  padding:9px 24px;background:var(--bg);color:var(--ok-tx);
  border:1px solid var(--ok-bd);border-radius:8px;
  cursor:pointer;font-size:14px;font-family:inherit;
  transition:background .12s
}
.btn-go:hover{background:#C0DD97;color:var(--ok-tx)}
@media(prefers-color-scheme:dark){
  .btn-go:hover{background:#1f4a1f}
}

/* ── Done panel ── */
.done-panel{
  margin-top:1.5rem;padding:1.5rem;
  background:var(--ok-bg);border:1px solid var(--ok-bd);
  border-radius:12px;text-align:center
}
.done-panel h3{font-size:20px;font-weight:500;color:var(--ok-tx);margin-bottom:.5rem}
.done-panel p{color:var(--ok-tx);margin-bottom:1rem;font-size:14px}

/* ── Result list ── */
.res-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.res-icon{flex-shrink:0;margin-top:2px}
.res-q{flex:1;color:var(--text)}

/* ── Mobile ── */
@media(max-width:768px){
  :root{--switch-h:34px}
  #app{flex-direction:column}
  #sidebar{
    width:100%;height:auto;position:static;
    display:flex;overflow-x:auto;overflow-y:hidden;
    padding:6px 8px;gap:4px;flex-wrap:nowrap;
    border-right:none;border-bottom:1px solid var(--border)
  }
  .nav-top,.nav-sep,.nav-group{display:none}
  .nav-item{
    white-space:nowrap;padding:6px 11px;border-left:none;
    border-radius:6px;border-bottom:2px solid transparent;font-size:12px
  }
  .nav-item.active{border-left:none;border-bottom-color:var(--acc);background:var(--acc-l)}
  .nav-dot{display:none}
  #main{padding:1rem}
  #main-inner{max-width:100%}
  .sec-title{font-size:20px}
  pre{font-size:12px}
  .dot{width:20px;height:20px;font-size:9px}
  .opt{font-size:13px}
  #switchbar{padding:0 8px;gap:5px}
  .sw-menu>summary{height:24px;padding:0 8px;font-size:11px}
  .sw-menu-body{min-width:180px}
  .sw-link{min-height:26px;padding:0 8px;font-size:11px}
  .sw-user{width:24px;height:24px}
  .sw-user-icon{font-size:11px}
  .sw-user-initial{min-width:11px;height:11px;font-size:7px}
}
</style>
</head>
<body>
<div id="switchbar">
  <details class="sw-menu">
    <summary>Python-minikurs</summary>
    <div class="sw-menu-body">
      <a class="sw-link" href="./?view=overview">YH Prep: Översikt</a>
      <a class="sw-link" href="./?view=bank&track=prog1a">YH Prep: Frågebank (Prog)</a>
      <a class="sw-link" href="./?view=mock">YH Prep: Mockprov</a>
      <a class="sw-link current" href="./python-minikurs.html">Python-minikurs</a>
    </div>
  </details>
  <button id="user-avatar" class="sw-user" title="Byt användare">
    <span class="sw-user-icon" aria-hidden="true">👤</span>
    <span id="sw-user-initial" class="sw-user-initial">G</span>
  </button>
</div>
<div id="app">
  <nav id="sidebar"></nav>
  <main id="main"></main>
</div>
<script>
// ================================================================
// COURSE DATA
// ================================================================
const SECTIONS = [

// ----------------------------------------------------------------
// LEKTION 1
// ----------------------------------------------------------------
{
  id:'l1', type:'lesson', navTitle:'L1: Variabler', badge:'Grunderna',
  title:'Lektion 1: Variabler och datatyper',
  body:`
<p>En <strong>variabel</strong> är som en namngiven låda på skrivbordet — du lägger ett värde i den och kan plocka upp det senare. I Python behöver du aldrig deklarera typen, den räknar ut det själv.</p>
<pre><code>x = 42           # int — heltal
pris = 9.99      # float — decimaltal
namn = "Martin"  # str — text
aktiv = True     # bool — sant/falskt</code></pre>
<h3>De fyra grundtyperna</h3>
<p><code>int</code> — heltal: <code>0, 1, -5, 1000</code><br>
<code>float</code> — decimaltal: <code>3.14, -0.5, 1.0</code><br>
<code>str</code> — text inom citattecken: <code>"hej"</code>, <code>'a'</code><br>
<code>bool</code> — sant eller falskt: <code>True</code>, <code>False</code></p>
<div class="ibox"><strong>type()</strong> berättar vilken typ ett värde har:<br>
<code>print(type(42))</code> → <code>&lt;class 'int'&gt;</code><br>
<code>print(type(3.14))</code> → <code>&lt;class 'float'&gt;</code></div>
<h3>Dynamisk typning</h3>
<p>Python är <em>dynamiskt typat</em> — en variabel kan byta typ:</p>
<pre><code>x = 5       # x är int
x = "fem"   # nu är x str — helt OK</code></pre>
<h3>Vanliga nybörjarfel</h3>
<div class="errbox"><strong>NameError</strong> — du använder en variabel som inte är definierad:<br>
<code>print(ålder)  # NameError om ålder inte finns</code></div>
<div class="errbox"><strong>Skiftlägeskänslighet</strong> — <code>Namn</code> och <code>namn</code> är OLIKA variabler.</div>
<div class="okbox"><strong>Namnkonvention:</strong> använd <code>lower_case_with_underscores</code>. Börja aldrig med siffra.</div>`,
  questions:[
    {
      txt:'Vilken datatyp tilldelas variabeln <code>x</code> i denna Python-kod?',
      code:'x = 42',
      opts:['int','float','str','number'],
      ok:0,
      why:[
        '✓ Rätt! 42 är ett heltal utan decimalpunkt — Python ger det automatiskt typen <code>int</code>.',
        '✗ <code>float</code> används för decimaltal som <code>42.0</code>. Utan decimalpunkt blir 42 en <code>int</code>.',
        '✗ <code>str</code> kräver citattecken: <code>x = "42"</code>. Utan citattecken tolkas 42 som ett heltal.',
        '✗ Python har ingen typ som heter <code>number</code>. Heltal kallas <code>int</code> och decimaltal kallas <code>float</code>.'
      ],
      extra:{
        txt:'Träningsuppgift: Vilken datatyp har variabeln <code>y</code>?',
        code:'y = 3.14',
        opts:['float','int','double','str'],
        ok:0,
        why:[
          '✓ Rätt! 3.14 har en decimalpunkt — Python ger det typen <code>float</code>.',
          '✗ <code>int</code> är enbart heltal utan decimalpunkt. 3.14 innehåller en punkt och är alltså <code>float</code>.',
          '✗ Python har ingen typ som heter <code>double</code>. Decimaltal kallas <code>float</code>.',
          '✗ <code>str</code> kräver citattecken runt sig. <code>y = 3.14</code> är ett decimaltal, inte text.'
        ]
      }
    },
    {
      txt:'Vad skriver följande Python-kod ut?',
      code:'print(type("hej"))',
      opts:["&lt;class 'str'&gt;",'str','"hej"','string'],
      ok:0,
      why:[
        "✓ Rätt! <code>type()</code> returnerar ett klassobjekt. I Python 3 visas det som <code>&lt;class 'str'&gt;</code>.",
        "✗ <code>type()</code> returnerar inte bara texten 'str' utan ett klassobjekt: <code>&lt;class 'str'&gt;</code>.",
        '✗ <code>type()</code> returnerar typen av värdet, inte värdet självt. "hej" är vad vi skickar in, inte vad som skrivs ut.',
        "✗ Python kallar texttypen <code>str</code>, inte <code>string</code>. Och <code>type()</code> ger ett klassobjekt, inte ett namn."
      ],
      extra:{
        txt:'Träningsuppgift: Vad skriver denna Python-kod ut?',
        code:'print(type(True))',
        opts:["&lt;class 'bool'&gt;",'bool','True',"&lt;class 'int'&gt;"],
        ok:0,
        why:[
          "✓ Rätt! <code>True</code> har typen <code>bool</code>. <code>type()</code> returnerar <code>&lt;class 'bool'&gt;</code>.",
          "✗ <code>type()</code> returnerar ett klassobjekt, inte bara strängen 'bool'.",
          '✗ <code>True</code> är värdet vi skickar in till <code>type()</code>, inte utskriften.',
          '✗ <code>bool</code> är visserligen en underklass till <code>int</code> i Python, men <code>type(True)</code> ger ändå <code>bool</code>, inte <code>int</code>.'
        ]
      }

<h3>Hur det fungerar</h3>
<p>Python testar villkoren uppifrån och ned. Det första blocket vars villkor är <code>True</code> körs — sedan hoppas resten över. <code>else</code> körs bara om inget villkor ovan var sant.</p>
<pre><code>x = 7
if x > 10:
    print("A")      # hoppas över
elif x > 5:
    print("B")      # körs! (7 > 5)
else:
    print("C")      # hoppas över</code></pre>
<h3>Kombinera villkor</h3>
<pre><code>if ålder >= 18 and medborgarskap == "SE":

<pre><code>def addera(a, b):

<div class="ibox"><strong>return</strong> skickar ett värde ur funktionen som du kan lagra eller använda. <strong>print</strong> visar bara på skärmen — värdet försvinner.</div>

// ================================================================
// USER CONTEXT (shared with YH Prep app)
// ================================================================
const USER_KEY = 'yh.current-user-id';

function sanitizeUserId(value) {
  const safe = String(value || '').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
  return safe || 'gäst';
}

function getCurrentUserId() {
  const stored = localStorage.getItem(USER_KEY) || 'gäst';
  const normalized = sanitizeUserId(stored);
  localStorage.setItem(USER_KEY, normalized);
  return normalized;
}

function userBadge(userId) {
  const normalized = sanitizeUserId(userId);
  if (normalized === 'gäst') return 'G';
  const parts = normalized.split(/[-_]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return normalized.slice(0, 2).toUpperCase() || 'G';
}

function renderUserAvatar() {
  const btn = document.getElementById('user-avatar');
  const initial = document.getElementById('sw-user-initial');
  if (!btn) return;
  const userId = getCurrentUserId();
  if (initial) initial.textContent = userBadge(userId);
  btn.title = `Användare: ${userId}. Klicka för att byta.`;
}

function initUserAvatarSwitch() {
  const btn = document.getElementById('user-avatar');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const current = getCurrentUserId();
    const input = window.prompt('Byt user id (tomt = gäst):', current === 'gäst' ? '' : current);
    if (input === null) return;
    const nextUser = sanitizeUserId(input || 'gäst');
    localStorage.setItem(USER_KEY, nextUser);
    renderUserAvatar();
  });
}

  const nav = document.getElementById('sidebar');

  SECTIONS.forEach((sec, i) => {
    const st = secState[sec.id];

      <div class="quiz-h">Kunskapstest &mdash; Python</div>
      ${renderDots(sec, st)}
      <div id="quiz-body">${renderQuizBody(sec, st)}</div>
    </div>
  </div>`;

  document.getElementById('main').innerHTML = html;
  hlAll();

  // Init range lab if lesson 4
  if (sec.id === 'l4') initRangeLab();

  bindDots(sec, st);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderDots(sec, st) {
  let html = '<div class="dots" id="dots-bar">';
  st.queue.forEach((item, pos) => {
    const ans = st.answers[pos];
    let cls = 'dot';
    let label = pos + 1;
    let tipTxt = item.type === 'extra' ? `Träning ${pos+1}` : `Fråga ${pos+1}`;
    if (item.type === 'extra') { cls += ' extra'; label = '+'; }
    if (ans === undefined) {
      if (pos === Object.keys(st.answers).length) cls += ' cur';
    } else {
      cls += ans.correct ? ' ok' : ' fail';
      tipTxt += ans.correct ? ' — rätt' : ' — fel';
    }
    if (st.reviewPos === pos) cls += ' cur';
    html += `<div class="dot-wrap"><div class="${cls}" data-pos="${pos}">${label}</div><div class="dot-tip">${tipTxt}</div></div>`;
  });
  html += '</div>';
  return html;
}

function renderQuizBody(sec, st) {
  const answered = Object.keys(st.answers).length;

  // Review mode
  if (st.reviewPos !== null && st.reviewPos !== undefined) {
    const item = st.queue[st.reviewPos];
    const q = getQ(sec, item);
    const ans = st.answers[st.reviewPos];
    return renderQuestion(q, item.type, st.reviewPos, ans, true);
  }

  // All done
  if (answered >= st.queue.length) {
    return renderDone(sec, st);
  }

  // Current question
  const pos = answered;
  const item = st.queue[pos];
  const q = getQ(sec, item);
  const ans = st.answers[pos];
  return renderQuestion(q, item.type, pos, ans, false);
}

function getQ(sec, item) {
  if (item.type === 'main') return sec.questions[item.qIdx];
  return sec.questions[item.parentIdx].extra;
}

function renderQuestion(q, type, pos, ans, review) {
  const badge = type === 'extra'
    ? '<span class="extra-badge">🔁 Träningsuppgift — Python</span>'
    : '<span class="python-badge">🐍 Python</span>';

  let codeHtml = q.code ? `<div class="qcode"><pre><code>${esc(q.code)}</code></pre></div>` : '';

  let optsHtml = '<div class="opts">';
  q.opts.forEach((opt, i) => {
    let cls = 'opt';
    let disabled = '';
    if (ans !== undefined || review) {
      disabled = 'disabled';
      if (i === q.ok) cls += ' show-ok';
      if (ans !== undefined && i === ans.sel && !ans.correct) cls += ' sel-fail';
      if (ans !== undefined && i === ans.sel && ans.correct) cls += ' sel-ok';
    }
    optsHtml += `<button class="${cls}" ${disabled} onclick="answer(${pos},${i})">${opt}</button>`;
  });
  optsHtml += '</div>';

  let fbHtml = '';
  if (ans !== undefined) {
    const why = q.why[ans.sel];
    if (ans.correct) {
      fbHtml = `<div class="fb ok"><div class="fb-title">✓ Rätt!</div>${why}</div>`;
    } else {
      fbHtml = `<div class="fb fail"><div class="fb-title">✗ Fel svar</div>${why}</div>`;
    }
  }

  let nextBtn = '';
  if (ans !== undefined && !review) {
    const sec = SECTIONS[curSec];
    const st = secState[sec.id];
    const totalAnswered = Object.keys(st.answers).length;
    if (totalAnswered < st.queue.length) {
      nextBtn = `<button class="btn-next" onclick="nextQ()">Nästa fråga →</button>`;
    } else {
      nextBtn = `<button class="btn-next" onclick="refreshQuiz()">Se resultat →</button>`;
    }
  }

  return `<div class="qcard${review ? ' review-mode' : ''}">${badge}<div class="qtxt">${q.txt}</div>${codeHtml}${optsHtml}${fbHtml}${nextBtn}</div>`;
}

function renderDone(sec, st) {
  const total = st.queue.filter(i => i.type==='main').length;
  const correct = st.queue.filter((item,pos) => item.type==='main' && st.answers[pos]?.correct).length;

  let items = '';
  let mainIdx = 0;
  st.queue.forEach((item, pos) => {
    if (item.type !== 'main') return;
    mainIdx++;
    const ans = st.answers[pos];
    const icon = ans?.correct ? '✅' : '❌';
    const q = getQ(sec, item);
    items += `<div class="res-item"><div class="res-icon">${icon}</div><div class="res-q">Fråga ${mainIdx} — ${ans?.correct ? 'rätt' : 'fel'}</div></div>`;
  });

  const pct = Math.round(correct/total*100);
  const nextIdx = curSec + 1;
  const hasNext = nextIdx < SECTIONS.length;

  return `
    <div class="done-panel">
      <h3>${correct}/${total} rätt (${pct}%)</h3>
      <p>${pct >= 80 ? 'Bra jobbat! Redo för nästa avsnitt.' : 'Repetera gärna och gör om lektionen.'}</p>
      ${hasNext ? `<button class="btn-go" onclick="goSec(${nextIdx})">Nästa avsnitt →</button>` : '<p><strong>🎉 Du är klar med hela kursen!</strong></p>'}
    </div>
    <div class="result-summary">${items}</div>`;
}

// ================================================================
// INTERACTIONS
// ================================================================
function answer(pos, sel) {
  const sec = SECTIONS[curSec];
  const st = secState[sec.id];
  if (st.answers[pos] !== undefined) return; // already answered

  const item = st.queue[pos];
  const q = getQ(sec, item);
  const correct = sel === q.ok;
  st.answers[pos] = {sel, correct};

  // Inject extra if wrong and not already an extra and question has extra
  if (!correct && item.type === 'main' && q.extra) {
    st.queue.splice(pos + 1, 0, {type:'extra', parentIdx: item.qIdx});
  }

  refreshQuiz();
}

function nextQ() {
  const sec = SECTIONS[curSec];
  const st = secState[sec.id];
  st.reviewPos = null;
  refreshQuiz();
}

// ================================================================
// SYNTAX HIGHLIGHTING
// ================================================================
function hlCode(raw) {
  // Process line by line so comment spans don't bleed
  return raw.split('\n').map(line => {
    // 1. escape HTML first (code was already unescaped via textContent trick)
    // raw is plain text here — escape for HTML
    // 2. Find comment — everything after unquoted #
    let commentStart = -1;
    let inStr = false; let strCh = '';
    for (let i=0;i<line.length;i++){
      const c = line[i];
      if (!inStr && (c==='"'||c==="'")){inStr=true;strCh=c;}
      else if (inStr && c===strCh){inStr=false;}
      else if (!inStr && c==='#'){commentStart=i;break;}
    }
    let code = commentStart>=0 ? line.slice(0,commentStart) : line;
    let comment = commentStart>=0 ? line.slice(commentStart) : '';

    // Tokenise the code part: strings first, then keywords/numbers
    // Escape html in non-string segments
    function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    // Split on string literals (single or double quoted, no multiline)
    const parts = code.split(/((?:"[^"]*"|'[^']*'))/);
    code = parts.map((p,i)=>{
      if(i%2===1){
        // string literal
        return `<span class="str">${escH(p)}</span>`;
      }
      // escape, then highlight keywords and numbers
      let s = escH(p);
      // keywords
      const kws = ['for','while','if','elif','else','def','return','True','False','None','not','and','or','in','range','break','continue','print','append','remove','len','type','input','pass','import','from','class','with','as','try','except','raise'];
      kws.forEach(k=>{
        const re = new RegExp(`(?<![\\w.])${k}(?![\\w])`, 'g');
        s = s.replace(re, `<span class="kw">${k}</span>`);
      });
      // numbers (not inside words)
      s = s.replace(/(?<!\w)(\d+\.?\d*)(?!\w)/g,'<span class="num">$1</span>');
      return s;
    }).join('');

    // comment part
    if(comment){
      comment = `<span class="cmt">${escH(comment)}</span>`;
    }
    return code + comment;
  }).join('\n');
}

function hlAll() {
  document.querySelectorAll('pre code').forEach(el => {
    // only process if not already highlighted
    if (el.dataset.hl) return;
    el.dataset.hl = '1';
    const plain = el.textContent;
    el.innerHTML = hlCode(plain);
  });
}

function bindDots(sec, st) {
  document.querySelectorAll('#dots-bar .dot[data-pos]').forEach(d => {
    d.addEventListener('click', () => {
      const pos = parseInt(d.dataset.pos);
      if (st.answers[pos] !== undefined) {
        st.reviewPos = (st.reviewPos === pos) ? null : pos;
        refreshQuiz();
      }
    });
  });
}

function refreshQuiz() {
  const sec = SECTIONS[curSec];
  const st = secState[sec.id];
  // Re-render dots and quiz body
  const dotsEl = document.getElementById('dots-bar');
  if (dotsEl) dotsEl.outerHTML = renderDots(sec, st);
  document.getElementById('quiz-body').innerHTML = renderQuizBody(sec, st);
  hlAll();
  bindDots(sec, st);
  // Re-render nav
  renderNav();
  // Re-init range lab
  if (sec.id === 'l4') initRangeLab();
  // Scroll to quiz on mobile
  if (window.innerWidth < 620) {
    document.getElementById('quiz-body').scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function goSec(idx) {
  curSec = idx;
  const sec = SECTIONS[curSec];
  initSecState(sec);
  secState[sec.id].reviewPos = null;
  renderNav();
  renderMain();
  window.scrollTo(0, 0);
}

// ================================================================
// RANGE LAB
// ================================================================
function initRangeLab() {
  const startEl = document.getElementById('rl-start');
  const stopEl = document.getElementById('rl-stop');
  const stepEl = document.getElementById('rl-step');
  if (!startEl) return;

  function update() {
    const s = parseInt(startEl.value);
    const p = parseInt(stopEl.value);
    const t = parseInt(stepEl.value) || 1;
    document.getElementById('rl-sv').textContent = s;
    document.getElementById('rl-pv').textContent = p;
    document.getElementById('rl-tv').textContent = t;
    document.getElementById('rl-expr').textContent = `range(${s}, ${p}, ${t})`;

    const vals = [];
    if (t > 0) { for (let i=s; i<p && vals.length<30; i+=t) vals.push(i); }
    else if (t < 0) { for (let i=s; i>p && vals.length<30; i+=t) vals.push(i); }

    const res = vals.length === 0
      ? '→ [] (tom — kontrollera start/stopp/steg)'
      : '→ [' + vals.join(', ') + (vals.length===30 ? ', ...' : '') + ']';
    document.getElementById('rl-res').textContent = res;
  }

  startEl.addEventListener('input', update);
  stopEl.addEventListener('input', update);
  stepEl.addEventListener('input', update);
  update();
}

// ================================================================
// INIT
// ================================================================
renderUserAvatar();
initUserAvatarSwitch();
SECTIONS.forEach(initSecState);
renderNav();
renderMain();
</script>
